<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医疗智能体助手 - MedIntellect</title>
    <!-- 引入 Vue 2 和 Axios -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #app {
            width: 100%;
            max-width: 800px;
            height: 85vh; /* 适配不同屏幕高度 */
            max-height: 700px;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            background: #2d3748;
            color: white;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #4a5568;
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 10px;
            background: #48bb78;
            color: white;
            border-radius: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px #fff;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #f7fafc;
            scroll-behavior: smooth;
        }

        /* 滚动条美化 */
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: #edf2f7; }
        .chat-messages::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }

        .message {
            display: flex;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin: 0 12px;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message.user .avatar { background: #ebf8ff; }
        .message.assistant .avatar { background: #f0fff4; }

        .content {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.6;
            white-space: pre-wrap; /* 关键：保留换行符，用于显示列表 */
            word-wrap: break-word;
            font-size: 15px;
            color: #2d3748;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .message.user .content {
            background: #4299e1;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .content {
            background: white;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        /* 加载状态样式 */
        .loading .content {
            background: white;
            color: #718096;
            min-width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
        }

        .loading-text { font-size: 14px; margin-bottom: 8px; }

        .loading-bar {
            width: 100%;
            height: 4px;
            background: #edf2f7;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            width: 40%;
            height: 100%;
            background: #4299e1;
            border-radius: 2px;
            animation: loading 1.5s infinite ease-in-out;
        }

        @keyframes loading {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        .timeout-warning {
            color: #dd6b20;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
            background: #fffaf0;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #fbd38d;
        }

        .chat-input {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            gap: 12px;
        }

        .chat-input input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            outline: none;
            font-size: 15px;
            transition: all 0.2s;
            background: #f7fafc;
        }

        .chat-input input:focus {
            border-color: #4299e1;
            background: white;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .chat-input button {
            padding: 0 32px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(66, 153, 225, 0.2);
        }

        .chat-input button:hover:not(:disabled) {
            background: #3182ce;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px rgba(66, 153, 225, 0.3);
        }

        .chat-input button:active:not(:disabled) {
            transform: translateY(1px);
        }

        .chat-input button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="chat-container">
            <!-- 头部：移除了动态连接状态，改为静态“已就绪” -->
            <div class="chat-header">
                <h2>🏥 医疗智能体助手</h2>
                <div class="status-badge">系统已就绪</div>
            </div>

            <!-- 消息区域 -->
            <div class="chat-messages" ref="messagesContainer">
                <div v-for="(msg, index) in messages" :key="index"
                     :class="['message', msg.role]">
                    <div class="avatar">{{ msg.role === 'user' ? '👤' : '🤖' }}</div>
                    <div class="content">{{ msg.content }}</div>
                </div>

                <!-- 加载中状态 -->
                <div v-if="isLoading" class="message assistant loading">
                    <div class="avatar">🤖</div>
                    <div class="content">
                        <div class="loading-text">正在分析病情/查询号源...</div>
                        <div class="loading-bar"></div>
                        <div v-if="showTimeoutWarning" class="timeout-warning">
                            ⏳ 数据量较大，正在努力计算中，请稍候...
                        </div>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="chat-input">
                <input
                    v-model="inputMessage"
                    @keyup.enter="sendMessage"
                    placeholder="描述您的症状（如：我肚子疼）或直接输入序号预约..."
                    :disabled="isLoading"
                />
                <button @click="sendMessage" :disabled="isLoading || !inputMessage.trim()">
                    发送
                </button>
            </div>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                messages: [],
                inputMessage: '',
                isLoading: false,
                sessionId: null,
                apiBase: '/api', // 确保这里和你的 Flask 路由前缀一致
                timeoutTimer: null,
                showTimeoutWarning: false
            },
            mounted() {
                // 生成唯一会话 ID
                this.sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

                // 初始化欢迎语
                this.messages.push({
                    role: 'assistant',
                    content: '您好！我是您的医疗智能体助手。\n\n💡 您可以：\n1. 描述症状（如“我头疼发烧”），我会为您推荐科室并查询号源。\n2. 直接回复数字（如“1”）来预约显示的号源。'
                });
            },
            methods: {
                async sendMessage() {
                    if (!this.inputMessage.trim() || this.isLoading) return;

                    // 1. 添加用户消息到界面
                    const userText = this.inputMessage.trim();
                    this.messages.push({ role: 'user', content: userText });
                    this.inputMessage = '';
                    this.isLoading = true;
                    this.showTimeoutWarning = false;
                    this.scrollToBottom();

                    // 2. 设置超时警告计时器（30秒后提示）
                    this.timeoutTimer = setTimeout(() => {
                        this.showTimeoutWarning = true;
                    }, 30000);

                    try {
                        // 3. 发送请求给后端
                        // timeout: 0 表示不限制等待时间，直到后端返回或网络断开
                        const response = await axios.post(`${this.apiBase}/chat`, {
                            message: userText,
                            session_id: this.sessionId
                        }, {
                            timeout: 0
                        });

                        // 4. 添加助手回复
                        this.messages.push({
                            role: 'assistant',
                            content: response.data.response
                        });

                    } catch (error) {
                        console.error('API Error:', error);
                        let errorMsg = '⚠️ 服务暂时不可用，请稍后再试。';

                        if (error.response) {
                            // 服务器返回了错误状态码
                            const detail = error.response.data.detail || error.response.data.message || '未知错误';
                            errorMsg = `服务器响应错误：${detail}`;
                        } else if (error.request) {
                            // 请求发出但没有收到响应（通常是网络断开或服务未启动）
                            errorMsg = '❌ 无法连接到服务器。\n请确认后端 (python app.py) 正在运行。';
                        } else {
                            errorMsg = `请求配置错误：${error.message}`;
                        }

                        this.messages.push({ role: 'assistant', content: errorMsg });
                    } finally {
                        // 5. 清理状态
                        this.isLoading = false;
                        clearTimeout(this.timeoutTimer);
                        this.showTimeoutWarning = false;
                        this.scrollToBottom();
                    }
                },
                scrollToBottom() {
                    this.$nextTick(() => {
                        const container = this.$refs.messagesContainer;
                        if (container) {
                            container.scrollTop = container.scrollHeight;
                        }
                    });
                }
            }
        });
    </script>
</body>
</html>
